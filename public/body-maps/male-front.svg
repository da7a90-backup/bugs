    <rect id="left-ankle-inner" class="clickable-region" x="98" y="740" width="10" height="25"/>

    <!-- Right Ankle Inner -->
    <rect id="right-ankle-inner" class="clickable-region" x="192" y="740" width="10" height="25"/>
