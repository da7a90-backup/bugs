    <style>
      .body-outline { fill: #1a1a1a; stroke: #404040; stroke-width: 0.5; }
      .clickable-region { fill: transparent; stroke: none; cursor: pointer; transition: all 0.2s; }
      .clickable-region:hover { fill: rgba(139, 0, 0, 0.3); stroke: #8B0000; stroke-width: 1; }
      .clickable-region.selected { fill: rgba(139, 0, 0, 0.5); stroke: #8B0000; stroke-width: 1.5; }
    </style>
  </defs>

