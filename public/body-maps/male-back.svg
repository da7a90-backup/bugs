<svg viewBox="0 0 300 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .body-outline { fill: #1a1a1a; stroke: #404040; stroke-width: 0.5; }
      .muscle-definition { fill: none; stroke: #2a2a2a; stroke-width: 0.3; }
      .clickable-region { fill: transparent; stroke: none; cursor: pointer; transition: all 0.2s; }
      .clickable-region:hover { fill: rgba(139, 0, 0, 0.3); stroke: #8B0000; stroke-width: 1; }
      .clickable-region.selected { fill: rgba(139, 0, 0, 0.5); stroke: #8B0000; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Medically Accurate Male Body - Back View -->
  <g class="body-outline">
    <!-- Head -->
    <ellipse cx="150" cy="45" rx="30" ry="38"/>

    <!-- Neck with trapezius attachment -->
    <path d="M 135 83 Q 133 95, 130 105 L 170 105 Q 167 95, 165 83 Z"/>
