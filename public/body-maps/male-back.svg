      Q 240 135, 245 155
      L 250 195
      Q 252 220, 253 245
      L 255 285
      Q 256 310, 257 330
      L 258 355
      Q 259 370, 260 385
      L 262 405
      L 254 408
      L 252 385
      Q 251 370, 250 355
      L 248 330
      Q 247 310, 246 285
      L 244 245
      Q 243 220, 241 195
      L 236 155
      Q 231 135, 219 125
      Z
    "/>

    <!-- Left Leg -->
    <path d="
      M 105 325
      L 102 380
      Q 100 420, 98 460
      L 96 520
      Q 95 560, 94 600
      L 92 660
      Q 91 700, 90 740
      L 88 770
      L 95 773
      L 102 773
      L 104 770
      Q 105 700, 106 660
      L 108 600
      Q 109 560, 110 520
      L 112 460
      Q 114 420, 116 380
      L 119 325
      Z
    "/>

    <!-- Right Leg -->
    <path d="
      M 195 325
      L 198 380
      Q 200 420, 202 460
      L 204 520
      Q 205 560, 206 600
      L 208 660
